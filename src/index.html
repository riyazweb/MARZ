<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>three.js example</title>
    <style>
      body {
        margin: 0px;
        overflow: hidden;
        background: #ff7436;
      }
      #loading-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: #ff7436;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 1s ease-out;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
      }
      .loader {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #ffffff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      #loading-text {
        font-size: 1.2rem;
        letter-spacing: 2px;
      }

      /* CHAT UI */
      #chat-container {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        display: none; /* Hidden until needed */
        font-family: 'Segoe UI', sans-serif;
        z-index: 100;
      }
      #npc-name {
        font-weight: bold;
        font-size: 1.1rem;
        color: #d35400;
        margin-bottom: 5px;
      }
      #chat-text {
        font-size: 1rem;
        color: #333;
        line-height: 1.4;
      }
      #mic-btn {
        position: absolute;
        bottom: 50px; /* Moved up a bit */
        right: 50px;
        width: 120px; /* Big button */
        height: 120px;
        border-radius: 50%;
        background: #d35400;
        color: white;
        border: 4px solid #fff;
        font-size: 50px; /* Bigger icon */
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
      }
      #mic-btn:active { transform: scale(0.95); }
      #mic-btn:hover { transform: scale(1.05); background: #e67e22; }
      #mic-btn.listening { 
        background: #e74c3c; 
        animation: pulse 1.5s infinite;
        box-shadow: 0 0 30px #e74c3c;
      }
      .mic-hint {
        position: absolute;
        bottom: 20px;
        right: 50px;
        width: 120px;
        text-align: center;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        font-weight: bold;
        text-shadow: 1px 1px 3px black;
        pointer-events: none;
        z-index: 101;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
        100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader"></div>
      <div id="loading-text">PREPARING MARS EXPEDITION...</div>
    </div>

    <!-- CHAT BOX -->
    <div id="chat-container">
      <div id="npc-name">Alien</div>
      <div id="chat-text">...</div>
    </div>

    <!-- MIC BUTTON -->
    <button id="mic-btn">🎤</button>
    <div class="mic-hint">Hold ALT to Speak</div>
    <script src="index.js"></script>
  </body>
</html>
